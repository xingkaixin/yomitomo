name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-26
            command: pnpm make:app:mac-arm
            artifact: yomitomo-macos-arm64
            updateMetadata: dist/app/mac-arm64/latest-mac.yml
            artifactPath: |
              dist/app/mac-arm64/*.dmg
              dist/app/mac-arm64/*.zip
              dist/app/mac-arm64/*.blockmap
              dist/app/mac-arm64/latest*.yml
          - name: Windows x64
            os: windows-latest
            command: pnpm make:app:win-x64
            artifact: yomitomo-windows-x64
            updateMetadata: dist/app/win-x64/latest.yml
            artifactPath: |
              dist/app/win-x64/*.exe
              dist/app/win-x64/*.blockmap
              dist/app/win-x64/latest*.yml

    env:
      CI: true
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Make macOS release package
        if: matrix.artifact == 'yomitomo-macos-arm64'
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_HASH: ${{ secrets.MAC_CSC_HASH }}
          MAC_CSC_NAME: ${{ secrets.MAC_CSC_NAME }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for secret_name in \
            MAC_CSC_LINK \
            MAC_CSC_NAME \
            MAC_CSC_KEY_PASSWORD \
            APPLE_API_KEY_BASE64 \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER
          do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing required macOS release secret: $secret_name"
              exit 1
            fi
          done

          echo "::add-mask::$MAC_CSC_NAME"
          echo "::add-mask::$APPLE_TEAM_ID"
          if [ -n "$MAC_CSC_HASH" ]; then
            echo "::add-mask::$MAC_CSC_HASH"
          fi

          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 -D > "$api_key_path"
          chmod 600 "$api_key_path"

          YOMITOMO_FORCE_CODE_SIGNING=1 \
            YOMITOMO_MAC_NOTARIZE=1 \
            CSC_LINK="$MAC_CSC_LINK" \
            CSC_NAME="$MAC_CSC_NAME" \
            CSC_KEY_PASSWORD="$MAC_CSC_KEY_PASSWORD" \
            APPLE_API_KEY="$api_key_path" \
            APPLE_API_KEY_ID="$APPLE_API_KEY_ID" \
            APPLE_API_ISSUER="$APPLE_API_ISSUER" \
            APPLE_TEAM_ID="$APPLE_TEAM_ID" \
            ${{ matrix.command }}

      - name: Make release package
        if: matrix.artifact != 'yomitomo-macos-arm64'
        run: ${{ matrix.command }}

      - name: Verify macOS signing and notarization
        if: matrix.artifact == 'yomitomo-macos-arm64'
        shell: bash
        run: |
          app_path="$(find dist/app/mac-arm64 -type d -name 'Yomitomo.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "::error::Missing packaged macOS app bundle."
            exit 1
          fi

          codesign --verify --strict --verbose=2 "$app_path"
          spctl --assess --type execute --verbose "$app_path"
          xcrun stapler validate "$app_path"

          shopt -s nullglob
          for dmg_path in dist/app/mac-arm64/*.dmg; do
            xcrun stapler validate "$dmg_path"
          done

      - name: Verify update metadata
        shell: bash
        run: |
          if [ ! -f "${{ matrix.updateMetadata }}" ]; then
            echo "::error file=${{ matrix.updateMetadata }}::Missing electron-updater metadata."
            exit 1
          fi

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifactPath }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload release assets
        shell: bash
        run: |
          for metadata in \
            release-assets/yomitomo-macos-arm64/latest-mac.yml \
            release-assets/yomitomo-windows-x64/latest.yml
          do
            if [ ! -f "$metadata" ]; then
              echo "::error file=$metadata::Missing electron-updater metadata."
              exit 1
            fi
          done

          mapfile -t assets < <(find release-assets -type f \( \
            -name '*.dmg' -o \
            -name '*.zip' -o \
            -name '*.exe' -o \
            -name '*.blockmap' -o \
            -name 'latest*.yml' \
          \) | sort)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" --title "$GITHUB_REF_NAME" --generate-notes --draft
          fi
