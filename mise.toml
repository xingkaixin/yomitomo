[tools]
node = "24.15.0"
pnpm = "11.5.3"

[tasks."lint"]
run = "pnpm lint"

[tasks."format:check"]
run = "pnpm format:check"

[tasks."ui:check-primitives"]
run = "pnpm ui:check-primitives"

[tasks."typecheck"]
run = "pnpm typecheck"

[tasks."test"]
run = "pnpm test"

[tasks."build"]
run = "pnpm build"

[tasks."check:fast"]
run = [
  { task = "lint" },
  { task = "format:check" },
  { task = "typecheck" },
  { task = "test" },
]

[tasks."check"]
run = [
  { task = "lint" },
  { task = "ui:check-primitives" },
  { task = "format:check" },
  { task = "typecheck" },
  { task = "test" },
  { task = "build" },
]
