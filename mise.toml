[tools]
node = "24.15.0"
pnpm = "11.0.8"

[tasks."lint"]
run = "pnpm lint"

[tasks."format:check"]
run = "pnpm format:check"

[tasks."typecheck"]
run = "pnpm typecheck"

[tasks."test"]
run = "pnpm test"

[tasks."check"]
run = [
  { task = "lint" },
  { task = "format:check" },
  { task = "typecheck" },
  { task = "test" },
]
