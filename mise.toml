[tools]
node = "24.15.0"
pnpm = "11.11.0"

[tasks."lint"]
run = "pnpm lint"

[tasks."format:check"]
run = "pnpm format:check"

[tasks."ui:check-primitives"]
run = "pnpm ui:check-primitives"

[tasks."docs:check-paths"]
run = "pnpm docs:check-paths"

[tasks."typecheck"]
run = "pnpm typecheck"

[tasks."test"]
run = "pnpm test"

[tasks."test:app:e2e"]
run = "pnpm test:app:e2e"

[tasks."test:app:e2e:from-dist"]
run = "pnpm test:app:e2e:from-dist"

[tasks."build"]
run = "pnpm build"

[tasks."check:fast"]
run = [
  { task = "lint" },
  { task = "format:check" },
  { task = "typecheck" },
  { task = "test" },
]

[tasks."check"]
run = [
  { task = "lint" },
  { task = "docs:check-paths" },
  { task = "ui:check-primitives" },
  { task = "format:check" },
  { task = "typecheck" },
  { task = "test" },
  { task = "build" },
  { task = "test:app:e2e:from-dist" },
]
