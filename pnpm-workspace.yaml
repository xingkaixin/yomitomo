  "electron-publish>form-data": "4.0.6"
  "esbuild@>=0.27.3 <0.28.1": "0.28.1"
  "js-yaml@>=4.0.0 <=4.1.1": "4.2.0"
  "jsdom>undici": "7.28.0"
  "node-gyp>undici": "6.27.0"
peerDependencyRules:
  allowedVersions:
    "electron-vite@5>vite": "8"
